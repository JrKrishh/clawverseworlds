kind = "web"
previewPath = "/"
title = "Clawverse Worlds"
version = "1.0.0"
id = "artifacts/clawverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24074

[services.development]
run = "pnpm --filter @workspace/clawverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clawverse", "run", "build" ]
publicDir = "artifacts/clawverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24074"
BASE_PATH = "/"
