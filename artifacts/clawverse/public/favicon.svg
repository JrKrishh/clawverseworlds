<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="claw-grad" x1="130" y1="20" x2="50" y2="160">
      <stop offset="0%" stop-color="#d4f542"/>
      <stop offset="40%" stop-color="#84e025"/>
      <stop offset="100%" stop-color="#22a33a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="spark-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Hexagonal frame -->
  <path d="M90 12 L160 48 L160 132 L90 168 L20 132 L20 48 Z" fill="none" stroke="#1a6b35" stroke-width="3.5"/>

  <!-- Glow layer behind claw marks -->
  <g filter="url(#glow)" opacity="0.35">
    <line x1="115" y1="22" x2="40" y2="155" stroke="#7dd836" stroke-width="18" stroke-linecap="round"/>
    <line x1="135" y1="35" x2="60" y2="158" stroke="#7dd836" stroke-width="16" stroke-linecap="round"/>
    <line x1="152" y1="52" x2="82" y2="162" stroke="#7dd836" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Three diagonal claw slashes — tapered energy streaks -->
  <line x1="118" y1="18" x2="35" y2="158" stroke="url(#claw-grad)" stroke-width="14" stroke-linecap="round"/>
  <line x1="138" y1="32" x2="56" y2="160" stroke="url(#claw-grad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="155" y1="50" x2="80" y2="164" stroke="url(#claw-grad)" stroke-width="10" stroke-linecap="round"/>

  <!-- Energy sparks at slash tips -->
  <g filter="url(#spark-glow)" opacity="0.7">
    <circle cx="118" cy="18" r="6" fill="#e8f755"/>
    <circle cx="138" cy="32" r="5" fill="#d4f542"/>
    <circle cx="155" cy="50" r="4.5" fill="#c4ee38"/>
    <circle cx="35" cy="158" r="4" fill="#22a33a"/>
    <circle cx="56" cy="160" r="3.5" fill="#22a33a"/>
    <circle cx="80" cy="164" r="3" fill="#22a33a"/>
  </g>
  <circle cx="118" cy="18" r="3" fill="#f0ff70"/>
  <circle cx="138" cy="32" r="2.5" fill="#e8f755"/>
  <circle cx="155" cy="50" r="2" fill="#d4f542"/>

  <!-- Scattered energy particles -->
  <circle cx="125" cy="40" r="1.5" fill="#b8e830" opacity="0.6"/>
  <circle cx="145" cy="55" r="1.2" fill="#c4ee38" opacity="0.5"/>
  <circle cx="108" cy="28" r="1" fill="#e8f755" opacity="0.7"/>
  <circle cx="50" cy="145" r="1.3" fill="#4abd40" opacity="0.5"/>
  <circle cx="70" cy="150" r="1" fill="#4abd40" opacity="0.4"/>
  <circle cx="130" cy="25" r="1.8" fill="#d4f542" opacity="0.5"/>
</svg>
